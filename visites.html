<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visites - Agence Prestige</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <div class="logo"><h4>🏠 Agence Prestige</h4><p>Immobilier Maroc</p></div>
    <nav>
        <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i><span> Dashboard</span></a>
        <a href="contrats.html" class="nav-link"><i class="bi bi-file-text"></i><span> Contrats</span></a>
        <a href="visites.html" class="nav-link active"><i class="bi bi-eye"></i><span> Visites</span></a>
        <a href="agents.html" class="nav-link admin-only"><i class="bi bi-people"></i><span> Agents</span></a>
        <a href="commissions.html" class="nav-link"><i class="bi bi-calculator"></i><span> Commissions</span></a>
        <a href="rapports.html" class="nav-link"><i class="bi bi-graph-up"></i><span> Rapports</span></a>
        <a href="parametres.html" class="nav-link"><i class="bi bi-gear"></i><span> Paramètres</span></a>
        <hr><a href="#" class="nav-link text-danger" onclick="logout()"><i class="bi bi-box-arrow-right"></i><span> Déconnexion</span></a>
    </nav>
</div>

<div class="main-content fade-in">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div><h3 class="fw-bold mb-0">Suivi des visites</h3><p class="text-muted small">15 visites minimum pour débloquer le fixe de 5 000 MAD</p></div>
        <input type="month" id="filtreMois" class="form-control w-auto rounded-pill" style="width:160px;">
    </div>
    <div class="row g-4" id="visitesCards"></div>
</div>

<div class="modal fade" id="visitesModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content glass-card">
            <div class="modal-header border-0"><h5 class="modal-title">Modifier les visites</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="hidden" id="agentIdVisites">
                <input type="hidden" id="moisVisites">
                <p class="fw-bold" id="nomAgentVisites"></p>
                <input type="number" id="inputVisites" class="form-control" min="0" max="50">
                <div class="progress-custom mt-3"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
                <p class="text-muted small mt-2" id="progressText"></p>
            </div>
            <div class="modal-footer border-0"><button class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Annuler</button><button class="btn btn-primary rounded-pill" onclick="saveVisites()">Enregistrer</button></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
    (async () => {
        await loadData();
        if (!getCurrentUser()) window.location.href = "login.html";
        if (!isAdmin()) document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
        function chargerVisites() {
            const mois = document.getElementById('filtreMois').value || getCurrentMonth();
            const agents = users.filter(u => u.role === 'agent');
            const contratsMois = contrats.filter(c => c.date.startsWith(mois));
            document.getElementById('visitesCards').innerHTML = agents.map(agent => {
                const nbVisites = getVisitesByAgentAndMonth(agent.id, mois);
                const contratsAgent = contratsMois.filter(c => c.agentId === agent.id);
                const salary = calculateSalary(agent, contratsAgent, nbVisites);
                const pct = Math.min(100, (nbVisites / 15) * 100);
                return `
                    <div class="col-md-6 col-xl-4">
                        <div class="glass-card p-3">
                            <div class="d-flex justify-content-between align-items-start">
                                <div><h5 class="fw-bold mb-0">${agent.name}</h5><small class="text-muted">${agent.email}</small></div>
                                <div class="fs-2 ${nbVisites >= 15 ? 'text-success' : 'text-warning'}">${nbVisites >= 15 ? '🏆' : '⏳'}</div>
                            </div>
                            <div class="mt-3">
                                <div class="d-flex justify-content-between small"><span>Objectif visites</span><span class="fw-bold">${nbVisites}/15</span></div>
                                <div class="progress-custom"><div class="progress-fill ${pct >= 100 ? 'bg-success' : pct >= 60 ? 'bg-warning' : 'bg-danger'}" style="width: ${pct}%"></div></div>
                                <small class="${nbVisites >= 15 ? 'text-success' : 'text-muted'}">${nbVisites >= 15 ? '✅ Fixe débloqué (5000 MAD)' : `⚠️ Encore ${15 - nbVisites} visites nécessaires`}</small>
                            </div>
                            <div class="row g-2 text-center mt-3">
                                <div class="col-4"><div class="bg-dark rounded p-2"><div class="fw-bold">${contratsAgent.length}</div><div class="small">Contrats</div></div></div>
                                <div class="col-4"><div class="bg-dark rounded p-2"><div class="fw-bold text-primary">${salary.rate}%</div><div class="small">Taux</div></div></div>
                                <div class="col-4"><div class="bg-dark rounded p-2"><div class="fw-bold text-success">${formatMoney(salary.total)}</div><div class="small">Total</div></div></div>
                            </div>
                            ${isAdmin() ? `<button class="btn btn-sm btn-outline-primary w-100 mt-3 rounded-pill" onclick="openVisitesModal(${agent.id}, '${agent.name}', ${nbVisites}, '${mois}')"><i class="bi bi-pencil"></i> Modifier visites</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        window.openVisitesModal = function(id, name, visits, mois) {
            document.getElementById('agentIdVisites').value = id;
            document.getElementById('moisVisites').value = mois;
            document.getElementById('nomAgentVisites').innerText = name + ' (' + mois + ')';
            document.getElementById('inputVisites').value = visits;
            updateProgress(visits);
            document.getElementById('inputVisites').oninput = (e) => updateProgress(e.target.value);
            new bootstrap.Modal(document.getElementById('visitesModal')).show();
        };
        function updateProgress(nb) {
            const pct = Math.min(100, (nb / 15) * 100);
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressText').innerHTML = pct >= 100 ? '✅ Fixe débloqué !' : `⏳ ${Math.max(0, 15 - nb)} visite(s) nécessaires`;
        }
        window.saveVisites = function() {
            const id = parseInt(document.getElementById('agentIdVisites').value);
            const mois = document.getElementById('moisVisites').value;
            const nb = parseInt(document.getElementById('inputVisites').value);
            if (id && mois) { updateVisits(id, mois, nb); bootstrap.Modal.getInstance(document.getElementById('visitesModal')).hide(); chargerVisites(); showToast("Visites mises à jour pour " + mois); }
        };
        document.getElementById('filtreMois').value = getCurrentMonth();
        document.getElementById('filtreMois').addEventListener('change', chargerVisites);
        chargerVisites();
    })();
</script>
</body>
</html>
