<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres - Agence Prestige</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <div class="logo"><h4>🏠 Agence Prestige</h4><p>Immobilier Maroc</p></div>
    <nav>
        <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i><span> Dashboard</span></a>
        <a href="contrats.html" class="nav-link"><i class="bi bi-file-text"></i><span> Contrats</span></a>
        <a href="visites.html" class="nav-link"><i class="bi bi-eye"></i><span> Visites</span></a>
        <a href="agents.html" class="nav-link admin-only"><i class="bi bi-people"></i><span> Agents</span></a>
        <a href="commissions.html" class="nav-link"><i class="bi bi-calculator"></i><span> Commissions</span></a>
        <a href="rapports.html" class="nav-link"><i class="bi bi-graph-up"></i><span> Rapports</span></a>
        <a href="parametres.html" class="nav-link active"><i class="bi bi-gear"></i><span> Paramètres</span></a>
        <hr><a href="#" class="nav-link text-danger" onclick="logout()"><i class="bi bi-box-arrow-right"></i><span> Déconnexion</span></a>
    </nav>
</div>

<div class="main-content fade-in">
    <h3 class="fw-bold mb-4">⚙️ Paramètres du compte</h3>
    <div class="row g-4">
        <div class="col-md-6">
            <div class="glass-card p-4">
                <h5 class="mb-3"><i class="bi bi-person-circle"></i> Mon profil</h5>
                <div class="mb-3"><label>Nom complet</label><input type="text" id="profilNom" class="form-control"></div>
                <div class="mb-3"><label>Email</label><input type="email" id="profilEmail" class="form-control"></div>
                <div class="mb-3"><label>Nouveau mot de passe</label><input type="password" id="profilPassword" class="form-control" placeholder="Laisser vide"></div>
                <button class="btn btn-primary w-100 rounded-pill" onclick="updateProfil()"><i class="bi bi-save me-2"></i>Enregistrer</button>
            </div>
        </div>
        <div class="col-md-6">
            <div class="glass-card p-4">
                <h5 class="mb-3"><i class="bi bi-palette"></i> Apparence</h5>
                <div class="d-flex justify-content-between align-items-center mb-3"><span>🌙 Mode sombre</span><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="darkModeToggle" style="width:50px; height:25px;"></div></div>
                <hr><h5 class="mb-3"><i class="bi bi-info-circle"></i> À propos</h5><p class="small text-muted">Version 2.0.0<br>Agence Prestige - Gestion des commissions immobilières<br>© 2025</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
    (async () => {
        await loadData();
        if (!getCurrentUser()) window.location.href = "login.html";
        if (!isAdmin()) document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
        const currentUser = getCurrentUser();
        document.getElementById('profilNom').value = currentUser.name;
        document.getElementById('profilEmail').value = currentUser.email;
        const darkModeToggle = document.getElementById('darkModeToggle');
        const isDark = localStorage.getItem('darkMode') === 'true';
        if (isDark) { document.body.classList.add('dark-mode'); darkModeToggle.checked = true; }
        darkModeToggle.addEventListener('change', (e) => {
            if(e.target.checked) { document.body.classList.add('dark-mode'); localStorage.setItem('darkMode','true'); }
            else { document.body.classList.remove('dark-mode'); localStorage.setItem('darkMode','false'); }
        });
        window.updateProfil = async function() {
            const newName = document.getElementById('profilNom').value;
            const newEmail = document.getElementById('profilEmail').value;
            const newPassword = document.getElementById('profilPassword').value;
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if(userIndex !== -1) {
                users[userIndex].name = newName;
                users[userIndex].email = newEmail;
                if(newPassword) users[userIndex].password = await hashPassword(newPassword);
                saveData();
                localStorage.setItem('userConnected', JSON.stringify(users[userIndex]));
                showToast("Profil mis à jour !");
                setTimeout(() => location.reload(), 1500);
            }
        };
    })();
</script>
</body>
</html>
