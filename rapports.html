<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapports - Agence Prestige</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <div class="logo"><h4>🏠 Agence Prestige</h4><p>Immobilier Maroc</p></div>
    <nav>
        <a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i><span> Dashboard</span></a>
        <a href="contrats.html" class="nav-link"><i class="bi bi-file-text"></i><span> Contrats</span></a>
        <a href="visites.html" class="nav-link"><i class="bi bi-eye"></i><span> Visites</span></a>
        <a href="agents.html" class="nav-link admin-only"><i class="bi bi-people"></i><span> Agents</span></a>
        <a href="commissions.html" class="nav-link"><i class="bi bi-calculator"></i><span> Commissions</span></a>
        <a href="rapports.html" class="nav-link active"><i class="bi bi-graph-up"></i><span> Rapports</span></a>
        <a href="parametres.html" class="nav-link"><i class="bi bi-gear"></i><span> Paramètres</span></a>
        <hr><a href="#" class="nav-link text-danger" onclick="logout()"><i class="bi bi-box-arrow-right"></i><span> Déconnexion</span></a>
    </nav>
</div>

<div class="main-content fade-in">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div><h3 class="fw-bold mb-0">📈 Rapports et statistiques</h3></div>
        <div class="d-flex gap-2">
            <input type="month" id="rapportMois" class="form-control w-auto rounded-pill">
            <button class="btn btn-primary rounded-pill" onclick="chargerRapports()"><i class="bi bi-arrow-repeat"></i></button>
            <button class="btn btn-success rounded-pill" onclick="exporterCSV()"><i class="bi bi-download"></i> CSV</button>
            <button class="btn btn-danger rounded-pill" onclick="exportToPDF('rapportContainer', 'rapport_commissions.pdf')"><i class="bi bi-file-pdf"></i> PDF</button>
        </div>
    </div>
    <div id="rapportContainer">
        <div class="row g-4 mb-4" id="kpiCards"></div>
        <div class="row g-4 mb-4">
            <div class="col-md-6"><div class="glass-card p-3"><h6 class="mb-3"><i class="bi bi-bar-chart-fill"></i> Top 5 agents</h6><canvas id="topChart" height="250"></canvas></div></div>
            <div class="col-md-6"><div class="glass-card p-3"><h6 class="mb-3"><i class="bi bi-pie-chart-fill"></i> Répartition des biens</h6><canvas id="typeChart" height="250"></canvas></div></div>
        </div>
        <div class="glass-card p-0 overflow-hidden">
            <div class="table-title px-3 py-2"><i class="bi bi-table"></i> Détail des commissions</div>
            <table class="table table-dark table-hover mb-0" id="pdfTable">
                <thead><tr><th>Agent</th><th>Visites</th><th>Contrats</th><th>Taux</th><th>CA</th><th>Commission</th><th>Fixe</th><th>Total</th></tr></thead>
                <tbody id="detailBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
    (async () => {
        await loadData();
        if (!getCurrentUser()) window.location.href = "login.html";
        if (!isAdmin()) document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
        let topChart, typeChart;
        window.chargerRapports = function() {
            const mois = document.getElementById('rapportMois').value || getCurrentMonth();
            const contratsMois = contrats.filter(c => c.date.startsWith(mois));
            const agents = users.filter(u => u.role === 'agent');
            const results = agents.map(a => {
                const contratsAgent = contratsMois.filter(c => c.agentId === a.id);
                const visitsMois = getVisitesByAgentAndMonth(a.id, mois);
                const salary = calculateSalary(a, contratsAgent, visitsMois);
                return { agent: a, ...salary, visitsMois };
            }).sort((a,b) => b.total - a.total);
            const totalCA = contratsMois.reduce((s,c) => s + c.prixVente, 0);
            const totalCom = results.reduce((s,r) => s + r.commission, 0);
            document.getElementById('kpiCards').innerHTML = `
                <div class="col-md-4"><div class="stat-card" style="background:linear-gradient(135deg,#0F6E56,#1D9E75);"><h6 class="opacity-75">CA Total</h6><h2 class="fw-bold">${formatMoney(totalCA)}</h2></div></div>
                <div class="col-md-4"><div class="stat-card" style="background:linear-gradient(135deg,#198754,#157347);"><h6 class="opacity-75">Transactions</h6><h2 class="fw-bold">${contratsMois.length}</h2></div></div>
                <div class="col-md-4"><div class="stat-card" style="background:linear-gradient(135deg,#ffc107,#ff9f00);"><h6 class="opacity-75">Commissions</h6><h2 class="fw-bold">${formatMoney(totalCom)}</h2></div></div>
            `;
            document.getElementById('detailBody').innerHTML = results.map(r => `
                <tr><td class="fw-semibold">${r.agent.name}</td><td><span class="badge ${r.visitsMois>=15?'bg-success':'bg-warning'}">${r.visitsMois}/15</span></td>
                <td><span class="badge bg-primary">${r.nbContrats}</span></td><td><span class="badge ${r.rate===1.5?'bg-danger':'bg-success'}">${r.rate}%</span></td>
                <td class="text-end">${formatMoney(r.totalSales)}</td><td class="text-end text-success">${formatMoney(r.commission)}</td>
                <td class="text-end">${formatMoney(r.fixed)}</td><td class="text-end fw-bold text-primary">${formatMoney(r.total)}</td></tr>
            `).join('');
            const top5 = results.slice(0,5);
            if(topChart) topChart.destroy();
            topChart = new Chart(document.getElementById('topChart'), { type:'bar', data:{ labels:top5.map(r=>r.agent.name.split(' ')[0]), datasets:[{ label:'Rémunération (MAD)', data:top5.map(r=>r.total), backgroundColor:'#0F6E56', borderRadius:10 }] } });
            const types = { Appartement:0, Villa:0, Bureau:0 };
            contratsMois.forEach(c => { if(types[c.type]!==undefined) types[c.type]++; });
            if(typeChart) typeChart.destroy();
            typeChart = new Chart(document.getElementById('typeChart'), { type:'pie', data:{ labels:Object.keys(types), datasets:[{ data:Object.values(types), backgroundColor:['#0F6E56','#EF9F27','#2563EB'] }] } });
        };
        window.exporterCSV = function() {
            const mois = document.getElementById('rapportMois').value || getCurrentMonth();
            const contratsMois = contrats.filter(c => c.date.startsWith(mois));
            const agents = users.filter(u => u.role === 'agent');
            let csv = "Agent;Visites;Contrats;Taux;CA;Commission;Fixe;Total\n";
            agents.forEach(a => {
                const contratsAgent = contratsMois.filter(c => c.agentId === a.id);
                const visitsMois = getVisitesByAgentAndMonth(a.id, mois);
                const salary = calculateSalary(a, contratsAgent, visitsMois);
                csv += `"${a.name}";${visitsMois};${salary.nbContrats};${salary.rate}%;${salary.totalSales};${salary.commission};${salary.fixed};${salary.total}\n`;
            });
            const blob = new Blob(["\uFEFF"+csv], { type:"text/csv;charset=utf-8;" });
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `rapport_${mois}.csv`; link.click(); URL.revokeObjectURL(blob);
            showToast("Rapport exporté !");
        };
        document.getElementById('rapportMois').value = getCurrentMonth();
        window.chargerRapports();
    })();
</script>
</body>
</html>
